version: 2
updates:
  - package-ecosystem: pip
    directory: "/"
    labels:
      - "pr: dependency-update"
    schedule:
      interval: weekly
      time: "06:00"
    open-pull-requests-limit: 5
    # Ignore patch bumps — pytest-homeassistant-custom-component manages
    # HA-pinned transitive deps; let only minor/major surface as PRs.
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-patch"
  - package-ecosystem: "github-actions"
    directory: "/"
    labels:
      - "pr: dependency-update"
    schedule:
      interval: weekly
      time: "06:00"
    open-pull-requests-limit: 5
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-patch"
